<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>AI Tool Advisor</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Tool Advisor</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f7ff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        max-width: 600px;
        width: 90%;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        text-align: center;
      }
      h1 {
        color: #3a3a8c;
        font-size: 2rem;
        margin-bottom: 10px;
      }
      p {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 30px;
      }
      textarea {
        width: 100%;
        height: 120px;
        border: 2px solid #d0d4ff;
        border-radius: 10px;
        padding: 12px;
        font-size: 1rem;
        resize: none;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        background-color: #3a3a8c;
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background-color: #2e2e70;
      }
     #result {
        margin-top: 30px;
        text-align: left;
        background: #f0f2ff;
        border-radius: 10px;
        padding: 24px;
        font-size: 1rem;
        color: #333;
        display: none;
        line-height: 1.7;
      }
      #result h1, #result h2, #result h3 {
        color: #3a3a8c;
        margin-top: 20px;
        margin-bottom: 8px;
      }
      #result table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
      }
      #result th, #result td {
        border: 1px solid #d0d4ff;
        padding: 8px 12px;
        text-align: left;
      }
      #result th {
        background: #3a3a8c;
        color: white;
      }
      #followup {
        margin-top: 20px;
        display: none;
      }
      #followup textarea {
        width: 100%;
        height: 80px;
        border: 2px solid #d0d4ff;
        border-radius: 10px;
        padding: 12px;
        font-size: 1rem;
        resize: none;
        box-sizing: border-box;
      }
      #followup button {
        margin-top: 10px;
        background-color: #5a5aad;
      }
      #loading {
        margin-top: 20px;
        color: #3a3a8c;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🤖 AI Tool Advisor</h1>
      <p>Describe your idea or project and get personalized AI tool recommendations.</p>
      <textarea id="idea" placeholder="Example: I want to build a chatbot for my small business..."></textarea>
      <button onclick="getRecommendation()">Find My AI Tools →</button>
      <p id="loading">🤔 Thinking...</p>
      <div id="result"></div>
      <div id="followup">
        <textarea id="followupIdea" placeholder="Ask a follow-up question..."></textarea>
        <button onclick="getRecommendation()">Ask Follow-up →</button>
      </div>

    <script>
      async function getRecommendation() {
        const idea = document.getElementById('idea').value;
        if (!idea) return alert('Please describe your idea first!');

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        const response = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idea })
        });

        const data = await response.json();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML = marked.parse(data.answer);
        document.getElementById('followup').style.display = 'block';
      }
    </script>
  </body>
</html>
